name: CI

on:
  push:
    branches: [main, new-main]
  pull_request:
    branches: [main, new-main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint:check

      - name: Type check
        run: npx vue-tsc -b

      - name: Build
        run: npm run build
